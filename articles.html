<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articles — YOASOBI Discography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .articles-wrap {
      max-width: 1050px;
      margin: 0 auto;
      padding: 0 1.5rem 5rem;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    /* ===== SECTION HEADER ===== */
    .art-section-header {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .art-section-label {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.62rem; letter-spacing: 0.3em;
      text-transform: uppercase; white-space: nowrap;
    }
    .art-section-line { flex: 1; height: 1px; background: var(--border); }
    .art-section-count {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.56rem; letter-spacing: 0.15em;
      color: var(--muted); white-space: nowrap;
    }

    /* ===== カテゴリフィルター ===== */
    .cat-filter { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; margin-bottom: 1.25rem; }

    /* ===== ARTICLE CARD ===== */
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }
    .article-card {
      background: rgba(11,18,40,0.7);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem;
      display: flex; flex-direction: column; gap: 0.7rem;
      transition: all 0.25s;
      text-decoration: none;
      position: relative; overflow: hidden;
    }
    .article-card:hover {
      border-color: var(--border-bright);
      transform: translateY(-2px);
      box-shadow: 0 0 0 1px rgba(196,25,96,0.1), 0 8px 24px rgba(0,0,0,0.5);
      text-decoration: none;
    }
    .article-card-line {
      position: absolute; bottom: 0; left: 0;
      height: 1px; width: 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      transition: width 0.5s ease;
    }
    .article-card:hover .article-card-line { width: 100%; }

    .article-source-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .article-source {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.56rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gold); border: 1px solid rgba(196,25,96,0.3);
      background: rgba(196,25,96,0.07);
      padding: 0.15rem 0.5rem; border-radius: 3px;
    }
    .article-date { font-size: 0.68rem; color: var(--muted); }
    .article-cat {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.52rem; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 0.12rem 0.45rem; border-radius: 3px;
    }
    .cat-interview { color: var(--blue-bright); border: 1px solid rgba(34,68,255,0.25); background: rgba(34,68,255,0.07); }
    .cat-analysis  { color: var(--teal);        border: 1px solid rgba(45,212,191,0.25); background: rgba(45,212,191,0.07); }
    .cat-news      { color: #a78bfa;             border: 1px solid rgba(167,139,250,0.25); background: rgba(167,139,250,0.07); }

    .article-title {
      font-size: 0.95rem; font-weight: 600;
      color: var(--white); line-height: 1.5;
    }
    .article-summary {
      font-size: 0.8rem; color: var(--muted);
      line-height: 1.7; flex: 1;
    }
    .article-read {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.58rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--gold);
      margin-top: auto; display: flex; align-items: center; gap: 0.35rem;
      transition: gap 0.2s;
    }
    .article-card:hover .article-read { gap: 0.6rem; }

    /* hidden by filter */
    .article-card.hidden { display: none; }

    /* ===== SEARCH ===== */
    .search-wrap { margin-bottom: 1rem; }
    .articles-search {
      background: rgba(11,18,40,0.8);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 0.5rem 1rem; color: var(--prose);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.85rem; width: 300px;
      transition: border-color 0.2s;
    }
    .articles-search::placeholder { color: var(--muted); }
    .articles-search:focus { outline: none; border-color: var(--gold); }

    .no-results {
      text-align: center; padding: 3rem;
      color: var(--muted); font-size: 0.85rem;
      display: none;
    }

    @media (max-width: 600px) {
      .articles-grid { grid-template-columns: 1fr; }
      .articles-search { width: 100%; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="rainbow-rule" style="position:absolute;top:0;left:0;right:0;"></div>
  <div class="header-inner">
    <a href="index.html" class="site-brand" style="text-decoration:none;">
      <span class="brand-name">YOASOBI</span>
      <span class="brand-sub">Discography</span>
    </a>
    <nav class="site-nav">
      <a href="singles.html" class="nav-link" data-color="blue">Singles</a>
      <a href="albums.html" class="nav-link" data-color="gold">EPs</a>
      <a href="lives.html" class="nav-link" data-color="teal">Lives</a>
      <a href="novels.html" class="nav-link" data-color="purple">Novels</a>
      <a href="articles.html" class="nav-link active" data-color="rose">Articles</a>
      <a href="profile.html" class="nav-link" data-color="rose">Profile</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-header">
    <div class="page-header-inner">
      <a href="index.html" class="page-back">← Back</a>
      <h1 class="page-title">Articles & <span class="accent">Press</span></h1>
      <p class="page-subtitle">特集・インタビュー・考察——厳選記事アーカイブ</p>
    </div>
  </div>

  <div class="articles-wrap">

    <section>
      <!-- 検索 & フィルター -->
      <div class="search-wrap">
        <input type="text" class="articles-search" id="artSearch" placeholder="タイトル・メディアで検索…" />
      </div>
      <div class="cat-filter">
        <span class="filter-label">Category:</span>
        <button class="filter-btn active" data-cat="all">All</button>
        <button class="filter-btn" data-cat="interview">Interview</button>
        <button class="filter-btn" data-cat="analysis">Analysis</button>
        <button class="filter-btn" data-cat="news">News / Story</button>
      </div>

      <div class="art-section-header">
        <span class="art-section-label" style="color:var(--gold);">厳選記事</span>
        <div class="art-section-line"></div>
        <span class="art-section-count" id="artCount"></span>
      </div>

      <div class="articles-grid" id="artGrid"></div>
      <p class="no-results" id="noResults">該当する記事が見つかりませんでした。</p>
    </section>

  </div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="rainbow-rule" style="margin-bottom:1.5rem;"></div>
    <p class="footer-text">
      YOASOBI Discography Archive &copy; 2025 — Fan-made site.<br>
      記事の著作権は各メディア・著者に帰属します。
    </p>
  </div>
</footer>

<script>
const ARTICLES = [
  {
    url:"https://books.bunshun.jp/articles/-/5706",
    source:"別冊文藝春秋",
    date:"2020年9月7日",
    cat:"interview",
    title:"YOASOBI「僕たちのルーツと、いま目指すミライ」",
    summary:"デビューから間もない2020年、ayaseとikuraがルーツとなった音楽（aiko・Maximum the Hormone・Taylor Swift等）と、音楽と小説を融合させる発想の源泉、そしてYOASOBIが目指す先について語った初期の貴重なロングインタビュー。"
  },
  {
    url:"https://billboard-japan.com/special/detail/3968",
    source:"Billboard JAPAN",
    date:"2023年6月",
    cat:"interview",
    title:"YOASOBIが語る「アイドル」誕生秘話、完璧で究極な『アイ』への想い",
    summary:"「アイドル」が世界的ヒットとなった直後のインタビュー。赤坂アカが書き下ろした原作小説「45510」との向き合い方、ikuraが「アイ」というキャラクターに込めた感情、ayaseのサウンド設計の裏側を深掘り。"
  },
  {
    url:"https://billboard-japan.com/special/detail/4205",
    source:"Billboard JAPAN",
    date:"2023年12月",
    cat:"interview",
    title:"目標は「YOASOBIを楽しく続けていくこと」——「アイドル」とツアーを経て、新章の始まりを予感した2023年を振り返る",
    summary:"Billboard Japan 2023年最多再生シングル「アイドル」の記録的ヒットと、初の全国アリーナツアー「電光石火」を経た2023年を総括するロングインタビュー。世界的な注目が高まる中でのYOASOBIの心境と、2024年以降の展望。"
  },
  {
    url:"https://billboard-japan.com/special/detail/2948",
    source:"Billboard JAPAN",
    date:"2020年",
    cat:"interview",
    title:"YOASOBIが語るユニット結成の経緯、音楽と小説を行き来する面白さ",
    summary:"ayaseがikuraのInstagramカバー動画を見て直接連絡したこと、「小説を音楽にする」というコンセプトが生まれた経緯、二人の出会いから「夜に駆ける」リリースまでの過程を詳細に語るインタビュー。"
  },
  {
    url:"https://billboard-japan.com/special/detail/4552",
    source:"Billboard JAPAN",
    date:"2024年10月",
    cat:"analysis",
    title:"YOASOBI、結成5周年——前例のない道を歩みつづけてきたその足跡を振り返る",
    summary:"結成5周年を記念した特集記事。「夜に駆ける」デビューからCoachella出演・ドーム公演達成まで、前例のないJ-POPユニットとして切り開いてきた5年間の軌跡を時系列で追う。"
  },
  {
    url:"https://natalie.mu/music/pp/wowow_yoasobi03",
    source:"音楽ナタリー",
    date:"2025年",
    cat:"interview",
    title:"「ライブバンド」YOASOBIの旅の終着点——全国を巡り磨き上げたステージ",
    summary:"WANDARA HALL TOUR 2025 全40公演を終えたYOASOBIの独占インタビュー。ライブバンドとしての進化、ayaseの地元・山口公演での感動、ツアーを通じて体感したファンとの絆について語る。"
  },
  {
    url:"https://monogatary.com/spotwrite/59988",
    source:"monogatary.com",
    date:"2021年",
    cat:"interview",
    title:"ヒット曲の原作誕生秘話〜YOASOBI原作者独占インタビュー〜",
    summary:"「夜に駆ける」「あの夢をなぞって」「ハルジオン」などYOASOBIの原作小説を執筆した作家たちへの独占インタビュー。なぜその小説を書いたか、音楽になったと聞いた時の気持ち、ayaseとの制作プロセスを作家視点で語る。"
  },
  {
    url:"https://www.billboard-japan.com/special/detail/2948",
    source:"Billboard JAPAN",
    date:"2020年",
    cat:"analysis",
    title:"＜インタビュー＞YOASOBIが語るユニット結成の経緯、音楽と小説を行き来する面白さ",
    summary:"「小説を音楽にする」というコンセプトはどのように生まれたのか。ayaseとikuraがプロジェクトの本質と音楽制作の哲学について語った対談。"
  },
  {
    url:"https://natalie.mu/music/pp/list/artist_id/116642",
    source:"音楽ナタリー",
    date:"随時更新",
    cat:"news",
    title:"YOASOBI 特集・インタビュー一覧 — 音楽ナタリー",
    summary:"音楽ナタリーが掲載してきたYOASOBIの特集・インタビュー記事のアーカイブ。デビューから最新活動まで、各時期の貴重な取材記録が一覧で読める。"
  },
  {
    url:"https://www.billboard-japan.com/artists/detail/932357",
    source:"Billboard JAPAN",
    date:"随時更新",
    cat:"news",
    title:"YOASOBI — Billboard JAPAN アーティストページ",
    summary:"Billboard JAPANによるYOASOBIのアーティストページ。チャート記録、インタビュー、コラムなど蓄積されてきた全記事へのアクセス拠点。"
  },
  {
    url:"https://excite.co.jp/news/article/E1616380714002/",
    source:"エキサイトニュース",
    date:"2021年3月",
    cat:"analysis",
    title:"「YOASOBIはピンクの使い分けがおもしろい」アニメMVから色彩設計の仕事について学ぶ",
    summary:"YOASOBIのアニメMVにおける色彩設計の意図を解説した専門的な記事。各楽曲のビジュアルカラーに込められた意味と、映像クリエイターとしての視点からYOASOBIの世界観を分析。"
  },
  {
    url:"https://natalie.mu/music/news/649936",
    source:"音楽ナタリー",
    date:"2025年11月25日",
    cat:"news",
    title:"RADWIMPS × YOASOBIが思いを交わし合った夜、ikura「今日が人生で一番の宝物」",
    summary:"RADWIMPS 20th ANNIVERSARY LIVE TOUR（横浜アリーナ）にゲスト出演したYOASOBIのライブレポート。ikuraが高校時代の思い出として語る「会心の一撃」カバー、野田洋次郎との「スパークル」コラボ、そして「今日が人生で一番の宝物」という感動のMCを詳報。"
  },
  {
    url:"https://natalie.mu/music/news/667269",
    source:"音楽ナタリー",
    date:"2026年4月6日",
    cat:"news",
    title:"12万人が熱狂！ONE OK ROCKが国立競技場でUVERworld、YOASOBIと貴重コラボ",
    summary:"ONE OK ROCK主催「THE MUSIC STADIUM 2026」（MUFG STADIUM／国立競技場）のライブレポート。4月5日のYOASOBI × ONE OK ROCKの対バン公演では、クライマックスに「Wherever you are」コラボが実現。両日計12万人を動員したJ-ROCKとJ-POPの歴史的な競演を詳報。"
  },
  {
    url:"https://cocotame.jp/series/013178/",
    source:"Cocotame（ソニーミュージック）",
    date:"2021年",
    cat:"analysis",
    title:"monogatary.comという『物語のタネ』の芽吹き——YOASOBIを生んだプラットフォームの舞台裏",
    summary:"YOASOBIが生まれたソニーミュージック運営のmonogatary.comの設計思想と、UGC（ユーザー生成コンテンツ）を活用したコンテンツビジネスの仕組みを公式視点で解説。"
  },
];

const grid = document.getElementById('artGrid');
const noRes = document.getElementById('noResults');
const countEl = document.getElementById('artCount');
let currentCat = 'all';
let searchQuery = '';

function catClass(cat) {
  return { interview:'cat-interview', analysis:'cat-analysis', news:'cat-news' }[cat] || 'cat-news';
}
function catLabel(cat) {
  return { interview:'Interview', analysis:'Analysis', news:'News' }[cat] || cat;
}

// カードを先に全部生成
ARTICLES.forEach(a => {
  const card = document.createElement('a');
  card.href = a.url;
  card.target = '_blank';
  card.rel = 'noopener noreferrer';
  card.className = 'article-card';
  card.dataset.cat = a.cat;
  card.dataset.text = (a.title + ' ' + a.source).toLowerCase();
  card.innerHTML = `
    <div class="article-card-line"></div>
    <div class="article-source-row">
      <span class="article-source">${a.source}</span>
      <span class="article-cat ${catClass(a.cat)}">${catLabel(a.cat)}</span>
      <span class="article-date">${a.date}</span>
    </div>
    <div class="article-title">${a.title}</div>
    <div class="article-summary">${a.summary}</div>
    <span class="article-read">記事を読む →</span>
  `;
  grid.appendChild(card);
});

function applyFilter() {
  const cards = grid.querySelectorAll('.article-card');
  let visible = 0;
  cards.forEach(card => {
    const catMatch = currentCat === 'all' || card.dataset.cat === currentCat;
    const txtMatch = !searchQuery || card.dataset.text.includes(searchQuery);
    const show = catMatch && txtMatch;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  countEl.textContent = `${visible} articles`;
  noRes.style.display = visible === 0 ? 'block' : 'none';
}

applyFilter();

document.getElementById('artSearch').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  applyFilter();
});

document.querySelectorAll('.cat-filter .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-filter .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    applyFilter();
  });
});
</script>
</body>
</html>
