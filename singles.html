<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Singles — YOASOBI Discography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <div class="rainbow-rule" style="position:absolute;top:0;left:0;right:0;"></div>
  <div class="header-inner">
    <a href="index.html" class="site-brand" style="text-decoration:none;">
      <span class="brand-name">YOASOBI</span>
      <span class="brand-sub">Discography</span>
    </a>
    <nav class="site-nav">
      <a href="singles.html" class="nav-link active" data-color="blue">Singles</a>
      <a href="albums.html" class="nav-link" data-color="gold">EPs</a>
      <a href="profile.html" class="nav-link" data-color="rose">Profile</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-header">
    <div class="page-header-inner">
      <a href="index.html" class="page-back">← Back</a>
      <h1 class="page-title">Singles <span class="accent">Collection</span></h1>
      <p class="page-subtitle">28 works · 2019–2025 · 発売年順</p>
    </div>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Year:</span>
    <button class="filter-btn active" data-year="all">All</button>
    <button class="filter-btn" data-year="2019">2019</button>
    <button class="filter-btn" data-year="2020">2020</button>
    <button class="filter-btn" data-year="2021">2021</button>
    <button class="filter-btn" data-year="2022">2022</button>
    <button class="filter-btn" data-year="2023">2023</button>
    <button class="filter-btn" data-year="2024">2024</button>
    <button class="filter-btn" data-year="2025">2025</button>
  </div>

  <section class="works-section">
    <div class="works-grid" id="grid"></div>
  </section>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="rainbow-rule" style="margin-bottom:1.5rem;"></div>
    <p class="footer-text">YOASOBI Discography Archive &copy; 2025 — Fan-made site.</p>
  </div>
</footer>

<script src="data.js"></script>
<script>
  const grid = document.getElementById('grid');

  function render(yearFilter) {
    grid.innerHTML = '';
    const years = [...new Set(DATA.singles.map(s => s.year))];

    years.forEach(year => {
      if (yearFilter !== 'all' && String(year) !== yearFilter) return;
      const items = DATA.singles.filter(s => s.year === year);

      const div = document.createElement('div');
      div.className = 'year-divider';
      div.innerHTML = `<span class="year-divider-text">${year}</span><div class="year-divider-line"></div>`;
      grid.appendChild(div);

      items.forEach((s, i) => {
        const globalIdx = DATA.singles.indexOf(s) + 1;
        const card = document.createElement('div');
        card.className = 'work-card' + (s.highlight ? ' highlight' : '');

        card.innerHTML = `
          <div class="work-card-line" style="background:linear-gradient(90deg, transparent, ${s.highlight ? 'var(--gold)' : 'var(--blue)'}, transparent);"></div>
          <div class="work-num">#${String(globalIdx).padStart(2,'0')}</div>
          <div class="work-title-ja">${s.title}</div>
          <div class="work-title-en">${s.titleEn}</div>
          <div class="work-date">${s.date}</div>
          <div class="work-cert">${s.cert}</div>
          <div class="work-chart">${s.chart}</div>
          ${s.note ? `<div class="work-note">${s.note}</div>` : ''}
        `;
        grid.appendChild(card);
      });
    });
  }

  render('all');

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(btn.dataset.year);
    });
  });
</script>
</body>
</html>
