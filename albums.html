<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPs / Albums — YOASOBI Discography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .eps-full-grid { display:flex; flex-direction:column; gap:2rem; }

    .ep-full-card {
      background: rgba(11,18,40,0.7);
      border: 1px solid var(--border);
      border-radius: 16px; overflow:hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .ep-full-card:hover {
      border-color: var(--border-bright);
      box-shadow: 0 0 0 1px rgba(245,200,66,0.1), 0 12px 36px rgba(0,0,0,0.5);
    }
    .ep-full-header {
      display: grid;
      grid-template-columns: 220px 1fr;
    }
    .ep-full-art {
      position:relative; aspect-ratio:1/1;
      background: linear-gradient(135deg,#0a1a3a,#1a3a6a);
      overflow:hidden;
    }
    .ep-full-art img {
      width:100%; height:100%; object-fit:cover;
      transition: transform 0.5s;
    }
    .ep-full-card:hover .ep-full-art img { transform:scale(1.04); }
    .ep-full-art-placeholder {
      width:100%; height:100%;
      display:flex; align-items:center; justify-content:center;
      font-family:'Cinzel',Georgia,serif;
      font-size:1.8rem; color:rgba(255,255,255,0.12);
    }
    .ep-full-meta {
      padding:1.75rem;
      display:flex; flex-direction:column; gap:0.85rem;
      border-bottom: 1px solid var(--border);
    }
    .ep-series-badge {
      font-family:'Cinzel',Georgia,serif;
      font-size:0.56rem; letter-spacing:0.22em;
      text-transform:uppercase; color:var(--teal);
      margin-bottom:0.1rem;
    }
    .ep-full-title {
      font-family:'Cinzel',Georgia,serif;
      font-size:1.6rem; font-weight:700;
      color:var(--white); letter-spacing:0.08em;
    }
    .ep-full-date {
      font-size:0.8rem; color:var(--muted);
    }
    .ep-stats-row {
      display:flex; gap:1.5rem; flex-wrap:wrap;
    }
    .ep-stat { display:flex; flex-direction:column; gap:0.1rem; }
    .ep-stat-label {
      font-family:'Cinzel',Georgia,serif;
      font-size:0.54rem; letter-spacing:0.2em;
      text-transform:uppercase; color:var(--muted);
    }
    .ep-stat-value { font-size:0.85rem; color:var(--white); font-weight:600; }

    .ep-full-body {
      display:grid; grid-template-columns:1fr 1fr;
      gap:0; border-top:1px solid var(--border);
    }
    .ep-body-left {
      padding:1.5rem; border-right:1px solid var(--border);
    }
    .ep-body-right { padding:1.5rem; }
    .ep-section-label {
      font-family:'Cinzel',Georgia,serif;
      font-size:0.56rem; letter-spacing:0.25em;
      text-transform:uppercase; color:var(--muted);
      margin-bottom:0.75rem;
    }
    .ep-track-detailed {
      list-style:none; display:flex; flex-direction:column; gap:0.5rem;
    }
    .ep-track-detailed li {
      display:flex; gap:0.6rem; align-items:flex-start;
      padding:0.4rem 0; border-bottom:1px solid rgba(26,38,64,0.5);
    }
    .ep-track-detailed li:last-child { border-bottom:none; }
    .ep-track-n {
      font-family:'Cinzel',Georgia,serif;
      font-size:0.56rem; color:var(--muted);
      min-width:1.5rem; padding-top:0.15rem;
    }
    .ep-track-info { display:flex; flex-direction:column; gap:0.1rem; }
    .ep-track-name { font-size:0.85rem; color:var(--prose); font-weight:500; }
    .ep-track-novel {
      font-family:'EB Garamond',Georgia,serif;
      font-style:italic; font-size:0.75rem; color:var(--muted);
    }
    .ep-concept-text {
      font-size:0.85rem; color:var(--muted); line-height:1.8;
      margin-bottom:1.25rem;
    }
    .ep-reception-text {
      font-size:0.83rem; color:var(--muted); line-height:1.75;
      padding:0.9rem 1rem;
      background:rgba(245,200,66,0.04);
      border:1px solid rgba(245,200,66,0.12);
      border-radius:8px;
    }
    .ep-reception-label {
      font-family:'Cinzel',Georgia,serif;
      font-size:0.54rem; letter-spacing:0.2em;
      text-transform:uppercase; color:var(--gold);
      margin-bottom:0.4rem;
    }

    /* シリーズ区切り */
    .series-divider {
      display:flex; align-items:center; gap:1rem;
      margin-bottom:0.75rem;
    }
    .series-divider-text {
      font-family:'Cinzel',Georgia,serif;
      font-size:0.62rem; letter-spacing:0.3em;
      text-transform:uppercase; color:var(--muted);
      white-space:nowrap;
    }
    .series-divider-line { flex:1; height:1px; background:var(--border); }

    @media (max-width:700px) {
      .ep-full-header { grid-template-columns:1fr; }
      .ep-full-art { aspect-ratio:16/9; }
      .ep-full-body { grid-template-columns:1fr; }
      .ep-body-left { border-right:none; border-bottom:1px solid var(--border); }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="rainbow-rule" style="position:absolute;top:0;left:0;right:0;"></div>
  <div class="header-inner">
    <a href="index.html" class="site-brand" style="text-decoration:none;">
      <span class="brand-name">YOASOBI</span>
      <span class="brand-sub">Discography</span>
    </a>
    <nav class="site-nav">
      <a href="singles.html" class="nav-link" data-color="blue">Singles</a>
      <a href="albums.html" class="nav-link active" data-color="gold">EPs</a>
      <a href="lives.html" class="nav-link" data-color="teal">Lives</a>
      <a href="profile.html" class="nav-link" data-color="rose">Profile</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-header">
    <div class="page-header-inner">
      <a href="index.html" class="page-back">← Back</a>
      <h1 class="page-title">EPs / <span class="accent">Albums</span></h1>
      <p class="page-subtitle">6 works · THE BOOK Series（3作） & E-SIDE Series（3作）</p>
    </div>
  </div>

  <section class="eps-section">
    <div class="eps-full-grid" id="epsGrid"></div>
  </section>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="rainbow-rule" style="margin-bottom:1.5rem;"></div>
    <p class="footer-text">YOASOBI Discography Archive &copy; 2025 — Fan-made site.</p>
  </div>
</footer>

<script src="data.js"></script>
<script>
  const grid = document.getElementById('epsGrid');
  const seriesGroups = [
    { label:'THE BOOK Series', items: DATA.eps.filter(e=>e.series&&e.series.startsWith('THE BOOK')) },
    { label:'E-SIDE Series',   items: DATA.eps.filter(e=>e.series&&e.series.startsWith('E-SIDE')) },
  ];

  seriesGroups.forEach(group => {
    const div = document.createElement('div');
    div.innerHTML = `
      <div class="series-divider">
        <span class="series-divider-text">${group.label}</span>
        <div class="series-divider-line"></div>
      </div>
    `;
    grid.appendChild(div);

    group.items.forEach(ep => {
      const tracks = ep.tracks.map((t, i) => `
        <li>
          <span class="ep-track-n">${String(i+1).padStart(2,'0')}.</span>
          <div class="ep-track-info">
            <span class="ep-track-name">${t.title}</span>
            <span class="ep-track-novel">${t.novel}</span>
          </div>
        </li>
      `).join('');

      const card = document.createElement('div');
      card.className = 'ep-full-card';
      card.innerHTML = `
        <div class="ep-full-header">
          <div class="ep-full-art">
            ${ep.artwork
              ? `<img src="${ep.artwork}" alt="${ep.title}" loading="lazy"
                   onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                 <div class="ep-full-art-placeholder" style="display:none;">YA</div>`
              : `<div class="ep-full-art-placeholder">YA</div>`
            }
          </div>
          <div class="ep-full-meta">
            <div>
              <div class="ep-series-badge">${ep.series}</div>
              <div style="display:flex;gap:0.6rem;align-items:center;margin-bottom:0.2rem;">
                <div class="ep-badge" style="margin:0;">${ep.badge}</div>
              </div>
              <div class="ep-full-title">${ep.title}</div>
            </div>
            <div class="ep-full-date">${ep.date} &nbsp;·&nbsp; ${ep.label}</div>
            <div class="ep-stats-row">
              <div class="ep-stat">
                <span class="ep-stat-label">Catalog</span>
                <span class="ep-stat-value">${ep.catalog}</span>
              </div>
              <div class="ep-stat">
                <span class="ep-stat-label">Sales</span>
                <span class="ep-stat-value">${ep.sales}</span>
              </div>
              <div class="ep-stat">
                <span class="ep-stat-label">Certification</span>
                <span class="ep-stat-value">${ep.cert}</span>
              </div>
              <div class="ep-stat">
                <span class="ep-stat-label">Chart Peak</span>
                <span class="ep-stat-value">${ep.chart}</span>
              </div>
            </div>
          </div>
        </div>
        <div class="ep-full-body">
          <div class="ep-body-left">
            <div class="ep-section-label">Track List</div>
            <ol class="ep-track-detailed">${tracks}</ol>
          </div>
          <div class="ep-body-right">
            <div class="ep-section-label">コンセプト</div>
            <p class="ep-concept-text">${ep.concept}</p>
            <div class="ep-reception-label">反響・記録</div>
            <p class="ep-reception-text">${ep.reception}</p>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  });
</script>
</body>
</html>
