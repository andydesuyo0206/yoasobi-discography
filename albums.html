<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPs / Albums — YOASOBI Discography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .ep-art-card {
      background: rgba(11,18,40,0.7);
      border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      display: grid; grid-template-columns: 200px 1fr;
      transition: all 0.3s ease;
    }
    .ep-art-card:hover {
      border-color: var(--border-bright);
      transform: translateY(-3px);
      box-shadow: 0 0 0 1px rgba(245,200,66,0.12), 0 12px 32px rgba(0,0,0,0.55);
    }
    .ep-art-wrap {
      position: relative; aspect-ratio: 1/1;
      overflow: hidden; background: var(--surface-2);
      align-self: start;
    }
    .ep-art-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.5s;
    }
    .ep-art-card:hover .ep-art-wrap img { transform: scale(1.05); }
    .ep-art-placeholder {
      width: 100%; height: 100%; min-height: 200px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', Georgia, serif;
      font-size: 1.2rem; color: rgba(255,255,255,0.1);
    }
    .ep-art-body {
      padding: 1.5rem;
      display: flex; flex-direction: column; gap: 1rem;
      overflow-y: auto;
    }
    @media (max-width: 600px) {
      .ep-art-card { grid-template-columns: 1fr; }
      .ep-art-wrap { aspect-ratio: 1/1; max-height: 200px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="rainbow-rule" style="position:absolute;top:0;left:0;right:0;"></div>
  <div class="header-inner">
    <a href="index.html" class="site-brand" style="text-decoration:none;">
      <span class="brand-name">YOASOBI</span>
      <span class="brand-sub">Discography</span>
    </a>
    <nav class="site-nav">
      <a href="singles.html" class="nav-link" data-color="blue">Singles</a>
      <a href="albums.html" class="nav-link active" data-color="gold">EPs</a>
      <a href="profile.html" class="nav-link" data-color="rose">Profile</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-header">
    <div class="page-header-inner">
      <a href="index.html" class="page-back">← Back</a>
      <h1 class="page-title">EPs / <span class="accent">Albums</span></h1>
      <p class="page-subtitle">6 works · THE BOOK Series & E-SIDE Series</p>
    </div>
  </div>

  <section class="eps-section">
    <div style="display:flex; flex-direction:column; gap:1.5rem;" id="epsGrid"></div>
  </section>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="rainbow-rule" style="margin-bottom:1.5rem;"></div>
    <p class="footer-text">YOASOBI Discography Archive &copy; 2025 — Fan-made site.</p>
  </div>
</footer>

<script src="data.js"></script>
<script>
  const grid = document.getElementById('epsGrid');

  DATA.eps.forEach(ep => {
    const card = document.createElement('div');
    card.className = 'ep-art-card';

    const tracks = ep.tracks.map((t, i) =>
      `<li><span class="ep-track-num">${String(i+1).padStart(2,'0')}.</span>${t}</li>`
    ).join('');

    card.innerHTML = `
      <div class="ep-art-wrap" style="background:linear-gradient(135deg,#0a1a3a,#1a3a6a);">
        ${ep.artwork
          ? `<img src="${ep.artwork}" alt="${ep.title}" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
             <div class="ep-art-placeholder" style="display:none;">YA</div>`
          : `<div class="ep-art-placeholder">YA</div>`
        }
      </div>
      <div class="ep-art-body">
        <div>
          <div class="ep-badge">${ep.badge}</div>
          <div class="ep-title" style="margin-top:0.5rem;">${ep.title}</div>
          <div class="ep-date">${ep.date} · ${ep.label}</div>
        </div>
        <div class="ep-meta-row">
          <div class="ep-meta-item">
            <span class="ep-meta-label">Sales</span>
            <span class="ep-meta-value">${ep.sales}</span>
          </div>
          <div class="ep-meta-item">
            <span class="ep-meta-label">Certification</span>
            <span class="ep-meta-value">${ep.cert}</span>
          </div>
          <div class="ep-meta-item">
            <span class="ep-meta-label">Chart</span>
            <span class="ep-meta-value">${ep.chart}</span>
          </div>
        </div>
        <div class="ep-tracks">
          <div class="ep-tracks-label">Track List</div>
          <ol class="ep-track-list">${tracks}</ol>
        </div>
        ${ep.note ? `<div class="ep-note">${ep.note}</div>` : ''}
      </div>
    `;
    grid.appendChild(card);
  });
</script>
</body>
</html>
