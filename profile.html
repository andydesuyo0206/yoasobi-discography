<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — YOASOBI Discography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* プロフィール専用スタイル */
    .profile-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    /* ユニット概要 */
    .unit-card {
      background: rgba(11,18,40,0.7);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .unit-card-header {
      padding: 2.5rem;
      text-align: center;
      position: relative;
      background: linear-gradient(135deg, rgba(74,143,255,0.08) 0%, rgba(245,200,66,0.06) 100%);
      border-bottom: 1px solid var(--border);
    }
    .unit-concept {
      font-family: 'EB Garamond', Georgia, serif;
      font-style: italic;
      font-size: 1.5rem;
      color: var(--gold);
      letter-spacing: 0.06em;
      margin-bottom: 0.75rem;
    }
    .unit-meta-row {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      margin-top: 1.25rem;
    }
    .unit-meta-item {
      text-align: center;
    }
    .unit-meta-label {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.58rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 0.2rem;
    }
    .unit-meta-value {
      font-size: 0.88rem;
      color: var(--prose);
      font-weight: 500;
    }
    .unit-card-body {
      padding: 1.75rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .unit-story-label {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.6rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--blue-bright);
      margin-bottom: 0.1rem;
    }
    .unit-story-text {
      font-size: 0.9rem;
      color: var(--prose);
      line-height: 1.8;
    }
    .name-origin {
      background: rgba(245,200,66,0.05);
      border: 1px solid rgba(245,200,66,0.18);
      border-radius: 8px;
      padding: 1rem 1.25rem;
    }
    .name-origin-label {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.58rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.4rem;
    }
    .name-origin-text {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.75;
    }

    /* メンバーカード */
    .members-section {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .member-full-card {
      background: rgba(11,18,40,0.7);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 220px 1fr;
    }
    .member-visual {
      background: linear-gradient(160deg, var(--surface-2) 0%, var(--bg-2) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1.5rem;
      gap: 1.25rem;
      border-right: 1px solid var(--border);
    }
    .member-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .avatar-ayase {
      background: linear-gradient(135deg, var(--blue) 0%, #2dd4bf 100%);
      box-shadow: 0 0 24px rgba(74,143,255,0.4);
      color: white;
      font-family: 'Inter', sans-serif;
    }
    .avatar-ikura {
      background: linear-gradient(135deg, var(--rose) 0%, var(--gold) 100%);
      box-shadow: 0 0 24px rgba(244,114,182,0.4);
      color: white;
      font-family: 'Inter', sans-serif;
    }
    .member-name-block {
      text-align: center;
    }
    /* ← ここが大文字に見える原因。Cinzelを使わず Inter に変更 */
    .member-name-display {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: 0.04em;
      line-height: 1.1;
    }
    .member-realname {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }
    .member-role-badge {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--blue-bright);
      border: 1px solid rgba(74,143,255,0.3);
      border-radius: 3px;
      padding: 0.2rem 0.6rem;
      text-align: center;
    }
    .member-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      justify-content: center;
    }
    .tag {
      font-size: 0.62rem;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.15rem 0.5rem;
    }

    .member-detail {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.6rem;
    }
    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    .detail-key {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .detail-val {
      font-size: 0.82rem;
      color: var(--prose);
    }
    .member-bio-text {
      font-size: 0.87rem;
      color: var(--muted);
      line-height: 1.8;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
    .member-solo {
      font-size: 0.8rem;
      color: var(--blue-bright);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .member-solo::before {
      content: '◆';
      font-size: 0.45rem;
      color: var(--blue);
    }

    /* 実績 */
    .achievements-card {
      background: rgba(11,18,40,0.7);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem;
    }
    .achiev-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.75rem;
      margin-top: 1.25rem;
    }
    .achiev-item {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      padding: 0.85rem 1rem;
      background: rgba(196,25,96,0.05);
      border: 1px solid rgba(196,25,96,0.18);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .achiev-item:hover {
      background: rgba(196,25,96,0.1);
      border-color: rgba(196,25,96,0.35);
      transform: translateY(-1px);
    }
    .achiev-gem {
      color: var(--gold);
      font-size: 0.5rem;
      margin-top: 0.45rem;
      flex-shrink: 0;
    }
    .achiev-text {
      font-size: 0.83rem;
      color: var(--prose);
      line-height: 1.6;
      flex: 1;
    }
    .achiev-hint {
      font-size: 0.6rem;
      color: var(--gold);
      opacity: 0;
      transition: opacity 0.2s;
      margin-top: 0.3rem;
      flex-shrink: 0;
      align-self: center;
    }
    .achiev-item:hover .achiev-hint { opacity: 1; }

    /* タイムライン */
    .timeline-card {
      background: rgba(11,18,40,0.7);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem;
    }
    .timeline-new {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: 1.25rem;
    }
    .tl-item {
      display: grid;
      grid-template-columns: 3.5rem 1fr;
      gap: 1rem;
    }
    .tl-year-col {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .tl-year {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .tl-line {
      flex: 1;
      width: 1px;
      background: var(--border);
      margin: 0.4rem 0;
    }
    .tl-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid var(--bg);
      flex-shrink: 0;
      margin: 0.1rem 0 0;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 0 0 rgba(245,200,66,0);
    }
    .tl-dot:hover {
      transform: scale(1.5);
      box-shadow: 0 0 0 4px rgba(245,200,66,0.25);
    }
    .tl-body {
      padding: 0.1rem 0 1.75rem;
    }
    .tl-item:last-child .tl-body {
      padding-bottom: 0;
    }
    .tl-text {
      font-size: 0.87rem;
      color: var(--muted);
      line-height: 1.75;
    }

    @media (max-width: 680px) {
      .member-full-card { grid-template-columns: 1fr; }
      .member-visual { flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid var(--border); padding: 1.5rem; }
      .member-name-block { text-align: left; }
      .member-tags { justify-content: flex-start; }
      .detail-grid { grid-template-columns: 1fr 1fr; }
      .achiev-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="rainbow-rule" style="position:absolute;top:0;left:0;right:0;"></div>
  <div class="header-inner">
    <a href="index.html" class="site-brand" style="text-decoration:none;">
      <span class="brand-name">YOASOBI</span>
      <span class="brand-sub">Discography</span>
    </a>
    <nav class="site-nav">
      <a href="singles.html" class="nav-link" data-color="blue">Singles</a>
      <a href="albums.html" class="nav-link" data-color="gold">EPs</a>
      <a href="lives.html" class="nav-link" data-color="teal">Lives</a>
      <a href="novels.html" class="nav-link" data-color="purple">Novels</a>
      <a href="articles.html" class="nav-link" data-color="rose">Articles</a>
      <a href="profile.html" class="nav-link active" data-color="rose">Profile</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-header">
    <div class="page-header-inner">
      <a href="index.html" class="page-back">← Back</a>
      <h1 class="page-title"><span class="accent">Profile</span></h1>
      <p class="page-subtitle">ayase × ikura — 小説を音楽にするユニット</p>
    </div>
  </div>

  <div class="profile-wrap" id="profileWrap"></div>
</main>

<!-- 実績モーダル -->
<div class="modal-overlay" id="achievModalOverlay">
  <div class="modal" style="grid-template-columns:1fr; max-width:520px;">
    <button class="modal-close" id="achievModalClose">✕</button>
    <div class="modal-body" style="padding:2rem;">
      <div>
        <div class="modal-badge" style="background:rgba(196,25,96,0.1);border-color:rgba(196,25,96,0.3);color:var(--gold);">Achievement</div>
        <div class="modal-title-ja" id="achievTitle" style="font-family:'Inter',sans-serif;font-size:1.05rem;font-weight:700;margin-top:0.6rem;line-height:1.5;"></div>
      </div>
      <div class="modal-divider"></div>
      <div class="modal-section-content" id="achievDetail" style="line-height:1.9;"></div>
    </div>
  </div>
</div>

<!-- タイムラインモーダル -->
<div class="modal-overlay" id="tlModalOverlay">
  <div class="modal" style="grid-template-columns:1fr; max-width:560px;">
    <button class="modal-close" id="tlModalClose">✕</button>
    <div class="modal-body" style="padding:2rem;">
      <div>
        <div class="modal-badge" id="tlYear"></div>
        <div class="modal-title-ja" id="tlHeading" style="font-family:'Inter',sans-serif; font-size:1.3rem; margin-top:0.4rem;"></div>
      </div>
      <div class="modal-divider"></div>
      <div class="modal-section-content" id="tlBody" style="line-height:1.85;"></div>
      <div id="tlTopics"></div>
    </div>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="rainbow-rule" style="margin-bottom:1.5rem;"></div>
    <p class="footer-text">
      YOASOBI Discography Archive &copy; 2025 — Fan-made site.<br>
      <a href="https://www.yoasobi-music.jp/" target="_blank" rel="noopener">Official Site</a>
    </p>
  </div>
</footer>

<script src="data.js"></script>
<script>
  const wrap = document.getElementById('profileWrap');
  const p = DATA.profile;

  /* ===== 1. ユニット概要 ===== */
  const unitCard = document.createElement('div');
  unitCard.className = 'unit-card';
  unitCard.innerHTML = `
    <div class="unit-card-header">
      <div class="unit-concept">"${p.concept}"</div>
      <p style="font-size:0.85rem;color:var(--muted);">ayase × ikura からなる2人組音楽ユニット</p>
      <div class="unit-meta-row">
        <div class="unit-meta-item">
          <span class="unit-meta-label">Debut</span>
          <span class="unit-meta-value">${p.debut}</span>
        </div>
        <div class="unit-meta-item">
          <span class="unit-meta-label">Label</span>
          <span class="unit-meta-value">${p.label}</span>
        </div>
        <div class="unit-meta-item">
          <span class="unit-meta-label">Genre</span>
          <span class="unit-meta-value">J-Pop / Electro-Pop</span>
        </div>
        <div class="unit-meta-item">
          <span class="unit-meta-label">Origin</span>
          <span class="unit-meta-value">monogatary.com</span>
        </div>
      </div>
    </div>
    <div class="unit-card-body">
      <div>
        <div class="unit-story-label">結成の経緯</div>
        <p class="unit-story-text">${p.formation.story}</p>
      </div>
      <div class="name-origin">
        <div class="name-origin-label">ユニット名の由来</div>
        <p class="name-origin-text">${p.formation.nameOrigin}</p>
      </div>
    </div>
  `;
  wrap.appendChild(unitCard);

  /* ===== 2. メンバーカード ===== */
  const membersSection = document.createElement('div');
  membersSection.className = 'members-section';
  membersSection.innerHTML = `
    <div class="section-sub-title" style="margin-bottom:0;">Members</div>
  `;

  p.members.forEach(m => {
    const isAyase = m.name === 'ayase';
    const initial = isAyase ? 'A' : 'i';
    const avatarClass = isAyase ? 'avatar-ayase' : 'avatar-ikura';
    const tags = m.tags.map(t => `<span class="tag">${t}</span>`).join('');

    const card = document.createElement('div');
    card.className = 'member-full-card';
    card.innerHTML = `
      <!-- 左: ビジュアル -->
      <div class="member-visual">
        <div class="member-avatar ${avatarClass}">${initial}</div>
        <div class="member-name-block">
          <div class="member-name-display">${m.name}</div>
          ${m.realName ? `<div class="member-realname">${m.realName}</div>` : ''}
        </div>
        <div class="member-role-badge">${m.role}</div>
        <div class="member-tags">${tags}</div>
      </div>

      <!-- 右: 詳細 -->
      <div class="member-detail">
        <div class="detail-grid">
          <div class="detail-item">
            <span class="detail-key">生年月日</span>
            <span class="detail-val">${m.born}</span>
          </div>
          <div class="detail-item">
            <span class="detail-key">年齢</span>
            <span class="detail-val">${m.age}</span>
          </div>
          <div class="detail-item">
            <span class="detail-key">出身</span>
            <span class="detail-val">${m.birthplace}</span>
          </div>
          <div class="detail-item">
            <span class="detail-key">身長</span>
            <span class="detail-val">${m.height}</span>
          </div>
          <div class="detail-item">
            <span class="detail-key">血液型</span>
            <span class="detail-val">${m.bloodType}</span>
          </div>
          <div class="detail-item">
            <span class="detail-key">担当</span>
            <span class="detail-val">${m.origin}</span>
          </div>
        </div>
        <p class="member-bio-text">${m.bio}</p>
        <div class="member-solo">${m.solo}</div>
      </div>
    `;
    membersSection.appendChild(card);
  });

  wrap.appendChild(membersSection);

  /* ===== 3. 主な実績 ===== */
  const achievOverlay = document.getElementById('achievModalOverlay');
  const achievClose   = document.getElementById('achievModalClose');
  achievClose.addEventListener('click', () => { achievOverlay.classList.remove('open'); document.body.style.overflow=''; });
  achievOverlay.addEventListener('click', e => { if(e.target===achievOverlay){ achievOverlay.classList.remove('open'); document.body.style.overflow=''; }});

  const achievCard = document.createElement('div');
  achievCard.className = 'achievements-card';
  achievCard.innerHTML = `<div class="section-sub-title">Major Achievements <span style="font-family:'Inter';font-size:0.62rem;color:var(--muted);font-weight:400;letter-spacing:0.05em;">— クリックで詳細を表示</span></div><div class="achiev-grid" id="achievGrid"></div>`;
  wrap.appendChild(achievCard);

  const achGrid = document.getElementById('achievGrid');
  p.achievements.forEach(a => {
    const item = document.createElement('div');
    item.className = 'achiev-item';
    item.innerHTML = `
      <span class="achiev-gem">◆</span>
      <span class="achiev-text">${a.text}</span>
      <span class="achiev-hint">→</span>
    `;
    item.addEventListener('click', () => {
      document.getElementById('achievTitle').textContent = a.text;
      document.getElementById('achievDetail').textContent = a.detail;
      achievOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    });
    achGrid.appendChild(item);
  });

  /* ===== 4. タイムライン ===== */
  const tlOverlay = document.getElementById('tlModalOverlay');
  const tlClose   = document.getElementById('tlModalClose');
  tlClose.addEventListener('click', () => { tlOverlay.classList.remove('open'); document.body.style.overflow=''; });
  tlOverlay.addEventListener('click', e => { if(e.target===tlOverlay){ tlOverlay.classList.remove('open'); document.body.style.overflow=''; }});
  document.addEventListener('keydown', e => { if(e.key==='Escape') { tlOverlay.classList.remove('open'); document.body.style.overflow=''; }});

  function openTlModal(t) {
    document.getElementById('tlYear').textContent = t.year;
    document.getElementById('tlHeading').textContent = t.detail.heading;
    document.getElementById('tlBody').textContent = t.detail.body;
    const topics = t.detail.topics.map(tp =>
      `<div style="display:flex;gap:0.6rem;align-items:center;font-size:0.8rem;color:var(--prose);padding:0.3rem 0;border-bottom:1px solid var(--border);">
         <span style="color:var(--gold);font-size:0.5rem;">◆</span>${tp}
       </div>`
    ).join('');
    document.getElementById('tlTopics').innerHTML = `
      <div style="margin-top:1rem;">
        <div style="font-family:'Cinzel',Georgia,serif;font-size:0.56rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;">主なトピック</div>
        ${topics}
      </div>
    `;
    tlOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  const tlCard = document.createElement('div');
  tlCard.className = 'timeline-card';
  tlCard.innerHTML = `<div class="section-sub-title">Timeline <span style="font-family:'Inter';font-size:0.65rem;color:var(--muted);font-weight:400;letter-spacing:0.05em;">— 丸をクリックで詳細を表示</span></div>`;

  const tlWrap = document.createElement('div');
  tlWrap.className = 'timeline-new';

  p.timeline.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'tl-item';
    item.innerHTML = `
      <div class="tl-year-col">
        <div class="tl-dot" title="${t.year}年の詳細を見る"></div>
        <div class="tl-year">${t.year}</div>
        ${i < p.timeline.length - 1 ? '<div class="tl-line"></div>' : ''}
      </div>
      <div class="tl-body">
        <p class="tl-text">${t.text}</p>
      </div>
    `;
    item.querySelector('.tl-dot').addEventListener('click', () => openTlModal(t));
    tlWrap.appendChild(item);
  });

  tlCard.appendChild(tlWrap);
  wrap.appendChild(tlCard);
</script>
</body>
</html>
