  <link rel="stylesheet" href="style.css" />
  <style>
    /* ===== 原作小説ページ専用スタイル ===== */
    .novels-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem 5rem;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    /* フィルターバー（ソース別） */
    .source-filter { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }

    /* セクション区切り */
    .novels-section-header {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.5rem 0 0.75rem;
    }
    .novels-section-label {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.6rem; letter-spacing: 0.3em;
      text-transform: uppercase; white-space: nowrap;
    }
    .novels-section-line { flex: 1; height: 1px; background: var(--border); }
    .novels-section-count {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.56rem; letter-spacing: 0.15em;
      color: var(--muted); white-space: nowrap;
    }

    /* 小説カードグリッド */
    .novels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 1rem;
    }

    /* 小説カード */
    .novel-card {
      background: rgba(11,18,40,0.7);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.4rem;
      display: flex; flex-direction: column; gap: 0.6rem;
      transition: border-color 0.3s, transform 0.25s, box-shadow 0.3s;
      position: relative; overflow: hidden;
    }
    .novel-card:hover {
      border-color: var(--border-bright);
      transform: translateY(-2px);
      box-shadow: 0 0 0 1px rgba(167,139,250,0.12), 0 8px 24px rgba(0,0,0,0.5);
    }
    .novel-card-line {
      position: absolute; bottom: 0; left: 0;
      height: 1px; width: 0;
      background: linear-gradient(90deg, transparent, #a78bfa, transparent);
      transition: width 0.6s ease;
    }
    .novel-card:hover .novel-card-line { width: 100%; }

    /* ソースバッジ */
    .novel-source-badge {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.54rem; letter-spacing: 0.18em;
      text-transform: uppercase;
      border-radius: 3px; padding: 0.18rem 0.55rem;
      border: 1px solid; width: fit-content;
    }
    .badge-monogatary { color: #a78bfa; border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.07); }
    .badge-anime      { color: var(--blue-bright); border-color: rgba(74,143,255,0.3); background: rgba(74,143,255,0.07); }
    .badge-manga      { color: var(--teal); border-color: rgba(45,212,191,0.3); background: rgba(45,212,191,0.07); }
    .badge-exclusive  { color: var(--gold); border-color: rgba(245,200,66,0.3); background: rgba(245,200,66,0.07); }
    .badge-collab     { color: var(--muted); border-color: var(--border); background: transparent; }

    /* タイトル */
    .novel-song-title {
      font-size: 1rem; font-weight: 600;
      color: var(--white); line-height: 1.3;
    }
    .novel-title {
      font-family: 'EB Garamond', Georgia, serif;
      font-style: italic; font-size: 1.05rem;
      color: #c4b5fd; line-height: 1.4;
    }
    .novel-author {
      font-size: 0.75rem; color: var(--muted);
    }
    .novel-summary {
      font-size: 0.8rem; color: var(--muted);
      line-height: 1.7;
      border-top: 1px solid var(--border);
      padding-top: 0.6rem; margin-top: 0.1rem;
    }

    /* 読むリンク */
    .novel-read-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.58rem; letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #a78bfa; border: 1px solid rgba(167,139,250,0.25);
      border-radius: 4px; padding: 0.28rem 0.7rem;
      transition: all 0.2s; width: fit-content;
      margin-top: 0.2rem;
    }
    .novel-read-link:hover {
      color: #c4b5fd; border-color: rgba(167,139,250,0.6);
      background: rgba(167,139,250,0.08);
    }
    .novel-read-link.unavailable {
      color: var(--muted); border-color: var(--border);
      cursor: default; pointer-events: none;
    }

    /* 検索 */
    .novels-search-wrap {
      display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;
    }
    .novels-search {
      background: rgba(11,18,40,0.8);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 0.5rem 1rem; color: var(--prose);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.85rem; width: 280px;
      transition: border-color 0.2s;
    }
    .novels-search::placeholder { color: var(--muted); }
    .novels-search:focus { outline: none; border-color: #a78bfa; }

    /* ヒーロー引用 */
    .novels-hero-quote {
      background: rgba(167,139,250,0.05);
      border: 1px solid rgba(167,139,250,0.18);
      border-radius: 14px; padding: 1.75rem 2rem;
      text-align: center;
    }
    .novels-hero-text {
      font-family: 'EB Garamond', Georgia, serif;
      font-style: italic; font-size: 1.25rem;
      color: #c4b5fd; line-height: 1.7; margin-bottom: 0.6rem;
    }
    .novels-hero-sub {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.6rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--muted);
    }

    @media (max-width: 600px) {
      .novels-grid { grid-template-columns: 1fr; }
      .novels-search { width: 100%; }
    }
  </style>
</head>

  },

    source:"anime", sourceName:"アニメ書き下ろし（花ざかりの君たちへ）",
    summary:"「花ざかりの君たちへ」EDテーマのために書き下ろされた短編。「BABY」と呼びかける無条件の愛と保護欲を、柔らかく包み込む文体で表現。",
    readUrl:"https://www.yoasobi-music.jp/",
    readLabel:"YOASOBI Official（CD封入）"
  },

  // ===== 漫画原作 =====
  {
    song:"群青", novelTitle:"ブルーピリオド", author:"山口つばさ",
    source:"manga", sourceName:"漫画原作（ヤングマガジン）",
    summary:"美大受験を目指す高校生たちの挫折と成長を描く、講談社「ヤングマガジン」連載の漫画作品。YOASOBIが初めて漫画を原作とした楽曲で、合唱アレンジが世界的に広まった。",
    readUrl:"https://mangacross.jp/comics/blueperiod",

  {

    summary:"ポケットモンスターのアニメ主題歌のために武田綾乃が書き下ろした短編小説。ピカチュウとトレーナーの絆を通じて「雨上がりの世界」を描いた物語。",

  },

  // ===== CD封入・非公開 =====
  {
    song:"モノトーン", novelTitle:"モノトーン", author:"東村アキコ",
    source:"anime", sourceName:"映画書き下ろし（映画「ふれる。」）",
    summary:"漫画家・東村アキコが映画「ふれる。」のために書き下ろした短編小説。白と黒の間に存在する無限のグレー——善悪の二項対立では割り切れない人間の複雑さを描く。",

    readLabel:"映画「ふれる。」公式サイトで読む"
  },
  {
    song:"Watch me!", novelTitle:"心コロロン", author:"篠原健太",
    source:"anime", sourceName:"アニメ書き下ろし（ウィッチウォッチ）",
    summary:"週刊少年ジャンプ連載「ウィッチウォッチ」の原作者・篠原健太がYOASOBIのために書き下ろした短編小説。TVアニメのOPテーマ「Watch me!」の原作で、少年ジャンプ公式サイトにて無料公開中。",
    readUrl:"https://www.shonenjump.com/j/witch_novel/",
    readLabel:"少年ジャンプ公式で読む"
  },
];

const container = document.getElementById('novelsContainer');

// グループ定義
const groups = [
  { src:'monogatary', label:'monogatary.com 掲載作', color:'#a78bfa', desc:'小説投稿サイト monogatary.com にて公開中の原作小説' },
  { src:'anime',      label:'アニメ・コラボ書き下ろし', color:'var(--blue-bright)', desc:'アニメ・漫画作家がYOASOBIのために書き下ろした短編小説' },
  { src:'manga',      label:'漫画原作', color:'var(--teal)', desc:'既存の漫画作品を原作とした楽曲' },
  { src:'exclusive',  label:'CD封入・非公開', color:'var(--gold)', desc:'CD封入ブックレットのみ／現在一般公開されていない原作小説' },
];

let currentSrc = 'all';
let searchQuery = '';

function getBadgeClass(src) {
  return { monogatary:'badge-monogatary', anime:'badge-anime', manga:'badge-manga', exclusive:'badge-exclusive', collab:'badge-collab' }[src] || 'badge-collab';
}

function render() {
  container.innerHTML = '';

  groups.forEach(group => {
    const items = NOVELS.filter(n => {
      const srcMatch = currentSrc === 'all' || n.source === currentSrc;
      const q = searchQuery.toLowerCase();
      const textMatch = !q ||
        n.song.toLowerCase().includes(q) ||
        n.novelTitle.toLowerCase().includes(q) ||
        n.author.toLowerCase().includes(q);
      return srcMatch && textMatch && n.source === group.src;
    });

    if (items.length === 0) return;

    const section = document.createElement('div');
    section.innerHTML = `
      <div class="novels-section-header">
        <span class="novels-section-label" style="color:${group.color};">${group.label}</span>
        <div class="novels-section-line"></div>
        <span class="novels-section-count">${items.length} works</span>
      </div>
      <p style="font-size:0.78rem;color:var(--muted);margin-bottom:1rem;">${group.desc}</p>
    `;

    const grid = document.createElement('div');
    grid.className = 'novels-grid';

    items.forEach(n => {
      const card = document.createElement('div');
      card.className = 'novel-card';
      card.innerHTML = `
        <div class="novel-card-line"></div>
        <span class="novel-source-badge ${getBadgeClass(n.source)}">${n.sourceName}</span>
        <div class="novel-song-title">🎵 ${n.song}</div>
        <div class="novel-title">「${n.novelTitle}」</div>
        <div class="novel-author">${n.author !== '—' ? '著：' + n.author : ''}</div>
        <div class="novel-summary">${n.summary}</div>
        ${n.readUrl
          ? `<a href="${n.readUrl}" target="_blank" rel="noopener" class="novel-read-link">📖 ${n.readLabel}</a>`
          : `<span class="novel-read-link unavailable">🔒 ${n.readLabel}</span>`
        }
      `;
      grid.appendChild(card);
    });

    section.appendChild(grid);
    container.appendChild(section);
  });

  if (container.innerHTML === '') {
    container.innerHTML = `<p style="text-align:center;color:var(--muted);padding:3rem 0;">該当する小説が見つかりませんでした。</p>`;
  }
}

// 検索
document.getElementById('novelSearch').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

// ソースフィルター
document.querySelectorAll('#sourceFilter .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#sourceFilter .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSrc = btn.dataset.src;
    render();
  });
});

render();
</script>
</body>
</html>
